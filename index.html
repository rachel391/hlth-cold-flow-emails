function App() {
  const [activeSegment, setActiveSegment] = React.useState(Object.keys(data)[0]);
  const [activeEmail, setActiveEmail] = React.useState(0);
  const [editMode, setEditMode] = React.useState(false);
  const [emails, setEmails] = React.useState(() => Object.fromEntries(Object.entries(data).map(([seg, v]) => [seg, v.emails.map(e => ({ ...e }))])));
  const [attendees, setAttendees] = React.useState(() => Object.fromEntries(Object.entries(data).map(([seg, v]) => [seg, [...v.notableAttendees]])));
  const [newAttendee, setNewAttendee] = React.useState("");
  const [copiedIdx, setCopiedIdx] = React.useState(null);

  const seg = data[activeSegment];
  const color = seg.color;
  const currentEmails = emails[activeSegment];
  const currentAttendees = attendees[activeSegment];

  const getRendered = (body) => {
    const sample = currentAttendees.slice(0, 3).join(", ");
    return body.replace(/\[NOTABLE_ATTENDEES\]/g, sample);
  };

  const handleBodyChange = (val) => {
    const updated = [...currentEmails];
    updated[activeEmail] = { ...updated[activeEmail], body: val };
    setEmails({ ...emails, [activeSegment]: updated });
  };

  const handleSubjectChange = (val) => {
    const updated = [...currentEmails];
    updated[activeEmail] = { ...updated[activeEmail], subject: val };
    setEmails({ ...emails, [activeSegment]: updated });
  };

  const removeAttendee = (i) => {
    const updated = [...currentAttendees];
    updated.splice(i, 1);
    setAttendees({ ...attendees, [activeSegment]: updated });
  };

  const addAttendee = () => {
    if (!newAttendee.trim()) return;
    setAttendees({ ...attendees, [activeSegment]: [...currentAttendees, newAttendee.trim()] });
    setNewAttendee("");
  };

  const copyEmail = (idx) => {
    const e = currentEmails[idx];
    const rendered = getRendered(e.body);
    navigator.clipboard.writeText(`Subject: ${e.subject}\n\n${rendered}`);
    setCopiedIdx(idx);
    setTimeout(() => setCopiedIdx(null), 1500);
  };

  return (
    <div style={{ fontFamily: "Inter, sans-serif", background: "#f4f6f9", minHeight: "100vh", paddingBottom: 40 }}>
      <div style={{ background: "#0a1628", padding: "20px 28px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <div style={{ color: "#00B4A2", fontWeight: 800, fontSize: 13, letterSpacing: 2, textTransform: "uppercase" }}>HLTH Europe 2026</div>
          <div style={{ color: "#fff", fontWeight: 700, fontSize: 20, marginTop: 2 }}>Cold Outreach Email Sequences</div>
        </div>
        <div style={{ color: "#aaa", fontSize: 12 }}>Amsterdam · 15-18 June 2026</div>
      </div>

      <div style={{ display: "flex" }}>
        <div style={{ width: 200, minWidth: 200, background: "#fff", borderRight: "1px solid #e5e7eb", minHeight: "calc(100vh - 64px)" }}>
          {Object.keys(data).map((s) => (
            <button key={s} onClick={() => { setActiveSegment(s); setActiveEmail(0); setEditMode(false); }}
              style={{ display: "block", width: "100%", textAlign: "left", padding: "14px 16px", fontSize: 13, fontWeight: activeSegment === s ? 700 : 400, background: activeSegment === s ? "#f0faf9" : "transparent", borderLeft: activeSegment === s ? `4px solid ${data[s].color}` : "4px solid transparent", border: "none", cursor: "pointer", color: activeSegment === s ? data[s].color : "#374151", lineHeight: 1.4 }}>
              {s}
            </button>
          ))}
        </div>

        <div style={{ flex: 1, padding: "24px 28px" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
            <div>
              <h2 style={{ margin: 0, fontSize: 20, fontWeight: 700, color: "#0a1628" }}>{activeSegment}</h2>
              <div style={{ fontSize: 12, color: "#6b7280", marginTop: 4 }}>
                CTA: <span style={{ fontWeight: 600, color }}>{seg.cta === "register" ? "Register / Attend" : seg.cta === "sponsor" ? "Sponsor / Exhibit" : "Register + Sponsor (mixed)"}</span>
                &nbsp;·&nbsp;3 email sequence
              </div>
            </div>
            <button onClick={() => setEditMode(!editMode)} style={{ background: editMode ? color : "#fff", color: editMode ? "#fff" : color, border: `1.5px solid ${color}`, borderRadius: 8, padding: "8px 18px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
              {editMode ? "Done editing" : "Edit copy"}
            </button>
          </div>

          <div style={{ background: "#fff", borderRadius: 10, padding: "16px 20px", marginBottom: 20, border: "1px solid #e5e7eb" }}>
            <div style={{ fontWeight: 700, fontSize: 13, color: "#0a1628", marginBottom: 10 }}>Notable Attendees - used as [NOTABLE_ATTENDEES] in copy</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {currentAttendees.map((a, i) => (
                <span key={i} style={{ background: "#f0faf9", border: `1px solid ${color}30`, color: "#0a1628", borderRadius: 20, padding: "4px 12px", fontSize: 12, display: "flex", alignItems: "center", gap: 6 }}>
                  {a}
                  {editMode && <button onClick={() => removeAttendee(i)} style={{ background: "none", border: "none", cursor: "pointer", color: "#ef4444", fontSize: 14, padding: 0, lineHeight: 1 }}>x</button>}
                </span>
              ))}
              {editMode && (
                <span style={{ display: "flex", gap: 4 }}>
                  <input value={newAttendee} onChange={e => setNewAttendee(e.target.value)} onKeyDown={e => e.key === "Enter" && addAttendee()} placeholder="Add organisation..." style={{ border: "1px solid #d1d5db", borderRadius: 20, padding: "4px 12px", fontSize: 12, outline: "none" }} />
                  <button onClick={addAttendee} style={{ background: color, color: "#fff", border: "none", borderRadius: 20, padding: "4px 12px", fontSize: 12, cursor: "pointer" }}>Add</button>
                </span>
              )}
            </div>
            <div style={{ marginTop: 8, fontSize: 11, color: "#9ca3af" }}>The first 3 names auto-insert where [NOTABLE_ATTENDEES] appears in the email preview.</div>
          </div>

          <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: 10, padding: "12px 16px", marginBottom: 16, fontSize: 12, color: "#92400e", lineHeight: 1.7 }}>
            <span style={{ fontWeight: 700 }}>Formatting guide - </span>
            Write body copy in plain text. The system auto-adds the personalised greeting, your signature, and opt-out line.
            &nbsp;Use <code style={{ background: "#fef3c7", padding: "1px 5px", borderRadius: 3 }}>* - item</code> for bullets &nbsp;·&nbsp;
            <code style={{ background: "#fef3c7", padding: "1px 5px", borderRadius: 3 }}>https://url</code> for auto-linked URLs &nbsp;·&nbsp;
            <code style={{ background: "#fef3c7", padding: "1px 5px", borderRadius: 3 }}>[link text](https://url)</code> for named links
          </div>

          <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
            {currentEmails.map((e, i) => (
              <button key={i} onClick={() => setActiveEmail(i)}
                style={{ padding: "8px 18px", borderRadius: 8, border: `1.5px solid ${activeEmail === i ? color : "#e5e7eb"}`, background: activeEmail === i ? color : "#fff", color: activeEmail === i ? "#fff" : "#374151", fontWeight: activeEmail === i ? 700 : 400, fontSize: 13, cursor: "pointer" }}>
                Email {i + 1}
              </button>
            ))}
          </div>

          <div style={{ background: "#fff", borderRadius: 10, border: "1px solid #e5e7eb", overflow: "hidden" }}>
            <div style={{ background: `${color}12`, borderBottom: "1px solid #e5e7eb", padding: "14px 20px", display: "flex", alignItems: "flex-start", gap: 10 }}>
              <div style={{ fontWeight: 700, fontSize: 12, color: "#6b7280", paddingTop: 2, minWidth: 60 }}>SUBJECT</div>
              {editMode ? (
                <input value={currentEmails[activeEmail].subject} onChange={e => handleSubjectChange(e.target.value)}
                  style={{ flex: 1, fontWeight: 600, fontSize: 14, color: "#0a1628", border: "1px solid #d1d5db", borderRadius: 6, padding: "4px 10px", outline: "none" }} />
              ) : (
                <div style={{ fontWeight: 600, fontSize: 14, color: "#0a1628" }}>{currentEmails[activeEmail].subject}</div>
              )}
            </div>

            <div style={{ background: "#f8fafc", borderBottom: "1px solid #e5e7eb", padding: "10px 20px", display: "flex", gap: 16, fontSize: 11.5, color: "#6b7280" }}>
              <span style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{ background: "#d1fae5", color: "#065f46", borderRadius: 4, padding: "1px 6px", fontWeight: 600 }}>AUTO</span> Hi {"{{First Name}}"},</span>
              <span style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{ background: "#d1fae5", color: "#065f46", borderRadius: 4, padding: "1px 6px", fontWeight: 600 }}>AUTO</span> Your signature</span>
              <span style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{ background: "#d1fae5", color: "#065f46", borderRadius: 4, padding: "1px 6px", fontWeight: 600 }}>AUTO</span> Opt-out line</span>
            </div>

            <div style={{ padding: "20px" }}>
              {editMode ? (
                <textarea value={currentEmails[activeEmail].body} onChange={e => handleBodyChange(e.target.value)}
                  style={{ width: "100%", minHeight: 420, fontFamily: "inherit", fontSize: 13.5, color: "#374151", lineHeight: 1.7, border: "1px solid #d1d5db", borderRadius: 8, padding: "14px", outline: "none", resize: "vertical", boxSizing: "border-box" }} />
              ) : (
                <pre style={{ margin: 0, fontFamily: "inherit", fontSize: 13.5, color: "#374151", lineHeight: 1.8, whiteSpace: "pre-wrap" }}>
                  {getRendered(currentEmails[activeEmail].body)}
                </pre>
              )}
            </div>
            <div style={{ borderTop: "1px solid #e5e7eb", padding: "12px 20px", display: "flex", justifyContent: "flex-end" }}>
              <button onClick={() => copyEmail(activeEmail)}
                style={{ background: copiedIdx === activeEmail ? "#10b981" : color, color: "#fff", border: "none", borderRadius: 8, padding: "8px 20px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
                {copiedIdx === activeEmail ? "Copied!" : "Copy email"}
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
